<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Playwrite+AU+QLD:wght@100..400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/bootstrap.min.css">
    <link rel="stylesheet" href="../CSS/styles.css">
    <link rel="stylesheet" href="../CSS/styles3.css">
    <title>Contact Us</title>
    <style>
        .pacifico-regular {
            font-family: "Pacifico", cursive;
            font-weight: 400;
            font-style: normal;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="header">
            <img class="logo" src="../IMAGES/Star.jpg" alt="Star-Night">
            <h1 class="heading">Sri's Stellar Boutique</h1>
        </div>
        <div class="content">  
            <h1 class="pacifico-regular">Welcome to Stellar Boutique!!!</h1>
        </div>
        <section>
            <form id="contact-form" class="cont-form" onsubmit="" action="#" method="POST" enctype="multipart/form-data">
                <div class="form-group">
                     <label for="uname">Name: </label>
                     <input type="text" name="uname" id="uname">
                </div>
                 <div class="form-group mb-3">
                     <label for="e-mail">E-mail: </label>
                     <input type="email" name="email" id="email">
                 </div>
                 <div class="form-group mb-3">
                     <label for="mobile">Mobile: </label>
                     <input type="number" name="mobile">
                 </div>  
                 <div class="form-group mb-3">
                    <textarea id="message" class="form-control" rows="4" cols="30" placeholder="Your Message"></textarea>
                </div>
                <br> 
                 <div class="form-group mb-4">
                     <label for="location">Location: 
                         <select name="state">
                             <option value="">Select</option>
                             <option value="TN">TamilNadu</option>
                             <option value="HD">Hyderabad</option>
                             <option value="BG">Bangalore</option>
                             <option value="KA">Cochin</option>
                             <option value="MI">Mumbai</option>
                             <option value="DL">Delhi</option>
                         </select>
                     </label>
                 </div> 
                <br>
                <input type="submit" value="Send Message" class="btn btn-primary">
             </form>
        </section>
        <footer class="foot">
            <h2 style="color:#10559A;">Contact Us</h2>
            <p> WhatsApp us: 98765-43210</p>
            <p> Email: boutiquess@gmail.com</p>
            <p class="f_text">Copyright &copy 2025 stellar_boutique.com shop. All Rights Reserved</p>
        </footer>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="../JS/main.js" ></script>
</body>
</html>
